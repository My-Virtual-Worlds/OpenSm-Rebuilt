name: Bug report
description: Platform Bug Report
title: "[Bug]: "
labels: [bug]
body:
- type: markdown
  attributes:
    value: |
      - Write a descriptive bug title above.
      - Search [open](https://github.com/My-Virtual-Worlds/OpenSm-Rebuilt/issues?q=is%3Aopen+label%3Abug+is%3Aissue) bugs to ensure that the issue has not already been identified.

- type: textarea
  attributes:
    label: Environment
    description: About Platform Text
    placeholder: ex. OpenSim-Rebuilt 1.0.0.0 (64bit) ...
  validations:
    required: true

- type: textarea
  attributes:
    label: Description
    description: Explain the problem.
  validations:
    required: true

- type: textarea
  attributes:
    label: Reproduction steps
    description: Steps to reproduce this bug
    placeholder: |
      1. First step
      2. Second step
      Expected: ...
      Actual: ...
  validations:
    required: true
